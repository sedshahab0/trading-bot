name: Deploy Dashboard

on:
  push:
    branches:
      - cursor/trading-bot-dashboard-ba88
      - main
    paths:
      - 'dashboard/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dashboard files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          HOST="${DEPLOY_HOST:-65.109.179.227}"
          USER="${DEPLOY_USER:-root}"
          PATH_ON_SERVER="${DEPLOY_PATH:-/opt/trading-bot}"
          echo "Deploying to ${USER}@${HOST}:${PATH_ON_SERVER}"
          rsync -avz --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            dashboard/ "${USER}@${HOST}:${PATH_ON_SERVER}/dashboard/"
          rsync -avz deploy/nginx/agennews.store.conf "${USER}@${HOST}:/etc/nginx/sites-available/agennews.store"
          ssh "${USER}@${HOST}" "nginx -t && systemctl reload nginx && pm2 restart dashboard && pm2 save"
          echo "Deploy complete"
